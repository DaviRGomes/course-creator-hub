server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Headers de segurança — nível server (aplica a locations SEM add_header próprio)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://conexoessociais.com.br" always;
    # HSTS: NÃO aqui — este container serve HTTP internamente (porta 80).
    # HSTS deve estar apenas no bloco HTTPS do Nginx do VPS (infra/nginx-vps-headers.conf).
    # Não adicionar headers Access-Control-* aqui — CORS é gerenciado exclusivamente pelo Spring Security.

    # Cache para assets com hash (js/css/imagens gerados pelo Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repetir headers de segurança: add_header em location sobrescreve os do server block
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://conexoessociais.com.br" always;
    }

    # SPA fallback: qualquer rota não encontrada devolve o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
